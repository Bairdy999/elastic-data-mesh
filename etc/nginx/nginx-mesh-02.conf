user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

#	include /etc/nginx/conf.d/*.conf;
#	include /etc/nginx/sites-enabled/*;

	server {
		listen 80 default_server;
#		server_name 192.168.0.36;
		location /cluster01/kibana {
			client_max_body_size 20M;
#			rewrite ^/cluster01(.*)$ $1 break;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_http_version 1.1;
			proxy_set_header Connection "Keep-Alive";
			proxy_set_header Proxy-Connection "Keep-Alive";
			proxy_pass http://cluster01-kibana:5601/cluster01/kibana;
		}

		location /cluster01/elastic2/ {
			client_max_body_size 20M;
			proxy_set_header Host $http_host;
			proxy_pass https://cluster01-elastic:9200/;
		}

		location /cluster01/elastic/ {
			client_max_body_size 20M;
#			rewrite ^/cluster01(.*)$ $1 break;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
			proxy_set_header Proxy-Connection "Keep-Alive";
			proxy_pass https://cluster01-elastic:9200/;
			proxy_pass_header Access-Control-Allow-Origin;
			proxy_pass_header Access-Control-Allow-Methods;
			proxy_hide_header Access-Control-Allow-Headers;
			add_header Access-Control-Allow-Headers 'X-Requested-With, Content-Type';
			add_header Access-Control-Allow-Credentials true;
		}

		location /cluster02/kibana {
			client_max_body_size 20M;
#			rewrite ^/cluster01(.*)$ $1 break;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_http_version 1.1;
			proxy_set_header Connection "Keep-Alive";
			proxy_set_header Proxy-Connection "Keep-Alive";
			proxy_pass http://cluster02-kibana:5601/cluster02/kibana;
		}
		
		location /cluster02/elastic/ {
			client_max_body_size 20M;
#			rewrite ^/cluster01(.*)$ $1 break;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_http_version 1.1;
			proxy_set_header Connection "";
			proxy_set_header Proxy-Connection "Keep-Alive";
			proxy_pass https://cluster02-elastic:9200/;
			proxy_pass_header Access-Control-Allow-Origin;
			proxy_pass_header Access-Control-Allow-Methods;
			proxy_hide_header Access-Control-Allow-Headers;
			add_header Access-Control-Allow-Headers 'X-Requested-With, Content-Type';
			add_header Access-Control-Allow-Credentials true;
		}
	}

}


